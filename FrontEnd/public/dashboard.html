<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LisoFlix - Dashboard</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="background">
        <div class="overlay"></div>

        <div class="login-container">
            <h1>Bem-vindo ao LisoFlix!</h1>
            <h3 id="boasvindas">Carregando...</h3>

            <div class="catalogo" id="catalogo"></div>

            <button class="registrar" onclick="logout()" style="background:#333;margin-top:20px;">Sair</button>
            <p id="mensagem"></p>
        </div>
    </div>

    <div id="modal" onclick="fecharTrailer()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center;">
    <iframe id="player" width="80%" height="80%" frameborder="0" allowfullscreen></iframe>
</div>

    <script src="dashboard.js"></script>
</body>
</html>
