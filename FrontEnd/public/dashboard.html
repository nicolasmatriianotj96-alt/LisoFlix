<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LisoFlix - Dashboard</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="background">
        <div class="overlay"></div>

        <div class="login-container">
            <h1>Bem-vindo ao LisoFlix!</h1>
            <button onclick="window.location.href='perfil.html'">Perfil</button>
            <h3 id="boasvindas">Carregando...</h3>

<div style="margin:20px 0;">
    <button onclick="mostrarAba('catalogo')" id="btnCatalogo" style="padding:10px 20px; background:#e50914; border:none; color:white; cursor:pointer; border-radius:5px 0 0 5px;">Catálogo</button>
    <button onclick="mostrarAba('favoritos')" id="btnFavoritos" style="padding:10px 20px; background:#333; border:none; color:white; cursor:pointer; border-radius:0 5px 5px 0;">♥ Meus Favoritos</button>
</div>

<div class="catalogo" id="catalogo"></div>
<div class="catalogo" id="favoritos" style="display:none;"></div>

            <button class="registrar" onclick="logout()" style="background:#333;margin-top:20px;">Sair</button>
            <p id="mensagem"></p>
        </div>
    </div>

    <div id="modal" onclick="if(event.target.id==='modal') fecharTrailer()" ...

<!-- Modal do Trailer -->
<div id="modalTrailer" onclick="fecharTrailer(event)" 
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.9); z-index:9999;">

    <button onclick="fecharTrailer(event)" 
            style="position:absolute; top:20px; right:30px; font-size:40px; 
                   color:white; background:none; border:none; cursor:pointer; z-index:10000;">×</button>
    
    <iframe id="playerTrailer" 
            style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); 
                   width:90%; height:80%; max-width:1280px; max-height:720px; 
                   border:none;" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen></iframe>
</div>

<script src="dashboard.js"></script>
</body>
</html>
