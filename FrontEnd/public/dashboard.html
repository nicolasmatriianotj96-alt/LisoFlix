<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LisoFlix - Dashboard</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="background">
        <div class="overlay"></div>

        <div class="login-container">
            <h1>Bem-vindo ao LisoFlix!</h1>
            <h3 id="boasvindas">Carregando...</h3>

            <div class="catalogo" id="catalogo"></div>

            <button class="registrar" onclick="logout()" style="background:#333;margin-top:20px;">Sair</button>
            <p id="mensagem"></p>
        </div>
    </div>

    <div id="modal" onclick="if(event.target.id==='modal') fecharTrailer()" ...

<!-- Modal do Trailer -->
<div id="modal" onclick="if(event.target.id==='modal') fecharTrailer()" 
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
     background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:9999;">
    
    <iframe id="player" width="1280" height="720" 
            style="max-width:90vw; max-height:90vh; border:none;"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen></iframe>
</div>

    <script src="dashboard.js"></script>
</body>
</html>
