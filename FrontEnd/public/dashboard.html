<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LisoFlix - Dashboard</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="background">
        <div class="overlay"></div>
        <div class="login-container">
            <h1 id="boasvindas">Carregando...</h1>
            <p id="mensagem"></p>

            <!-- HEADER COM SAIR -->
            <div class="header-dashboard">
                <button id="btnCatalogo" class="registrar" onclick="mostrarAba('catalogo')" style="flex:2;">Catálogo</button>
                <button id="btnFavoritos" class="registrar" onclick="mostrarAba('favoritos')" style="flex:2;">♥ Meus Favoritos <span id="countFav">0</span></button>
                <button class="registrar" onclick="logout()" style="flex:1; background:#333;">Sair</button>
            </div>

            <div class="header-dashboard">
    <button id="btnCatalogo" class="registrar" onclick="mostrarAba('catalogo')" style="flex:1.5;">Catálogo</button>
    <button id="btnFavoritos" class="registrar" onclick="mostrarAba('favoritos')" style="flex:1.5;">♥ Favoritos <span id="countFav">0</span></button>
    <button class="registrar" onclick="abrirPerfil()" style="flex:1;">Perfil</button>
    <button class="registrar" onclick="logout()" style="flex:1; background:#333;">Sair</button>
</div>

            <!-- BUSCA -->
            <input type="text" id="busca" placeholder="Buscar filmes..." onkeyup="filtrarFilmes()">

            <!-- CATÁLOGO E FAVORITOS -->
            <div id="catalogo" class="catalogo" style="display:grid;"></div>
            <div id="favoritos" class="catalogo" style="display:none;"></div>
        </div>
    </div>

    <!-- MODAL TRAILER -->
    <div id="modalTrailer" onclick="fecharTrailer(event)" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; justify-content:center; align-items:center;">
        <div style="position:relative; width:90%; max-width:800px;">
            <button onclick="fecharTrailer(event)" style="position:absolute; top:-40px; right:0; background:red; color:white; border:none; padding:10px 15px; border-radius:50%; font-size:20px; cursor:pointer;">X</button>
            <iframe id="playerTrailer" width="100%" height="450" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <!-- MODAL PERFIL -->
<div id="modalPerfil" onclick="fecharPerfil(event)" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; justify-content:center; align-items:center;">
    <div style="background:#1a1a1a; padding:30px; border-radius:12px; width:90%; max-width:400px; position:relative;">
        <button onclick="fecharPerfil(event)" style="position:absolute; top:10px; right:15px; background:transparent; color:white; border:none; font-size:24px; cursor:pointer;">X</button>
        <h2 style="margin-bottom:20px; text-align:center;">Editar Perfil</h2>
        <input type="text" id="novoNome" placeholder="Novo nome" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #333; background:#000; color:white;">
        <input type="password" id="novaSenha" placeholder="Nova senha" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid #333; background:#000; color:white;">
        <button class="registrar" onclick="salvarPerfil()" style="width:100%;">Salvar</button>
        <p id="msgPerfil" style="margin-top:15px; text-align:center;"></p>
    </div>
</div>

    <script src="dashboard.js"></script>
</body>
</html>
