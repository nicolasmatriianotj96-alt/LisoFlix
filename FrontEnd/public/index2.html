<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LisoFlix - Cadastro</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="background">
        <div class="overlay"></div>
        
        <div class="login-container">
            <h1>Cadastro LisoFlix</h1>
            
            <input id="usuario" type="text" placeholder="Usuário" required>
            <input id="email" type="email" placeholder="Email" required>
            <input id="senha" type="password" placeholder="Senha - 8+ caracteres" required>
            
            <button class="registrar" onclick="registrar()">Cadastrar</button>
            <button class="registrar" onclick="window.location.href='index.html'">Voltar</button>
            
            <p id="mensagem"></p>
            
            <h3>Já tem conta? <a href="index.html" style="color:red;">Fazer login</a></h3>
        </div>
    </div>

    <script src="index2.js"></script>
</body>
</html>
